# LiteLLM Configurations
# This yaml file is used to config for LiteLLM Proxy Server.
model_list:
  - model_name: claude-opus-4-6
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_key: "os.environ/ANTHROPIC_API_KEY"
      api_base: "os.environ/LITELLM_ANTHROPIC_BASE_URL"
  - model_name: glm-5
    litellm_params:
      model: zai/glm-5
      api_base: "os.environ/GLM_BASE_URL"
      api_key: "UNUSED"

litellm_settings:
  drop_params: true

general_settings:
  master_key: "os.environ/LITELLM_API_KEY"
  database_url: "postgresql://hosjiu:sanora@localhost:5432/hosjiu"
  store_model_in_db: true
  store_prompts_in_spend_logs: true